<nav>
  <a class="brand" routerLink="/">Binbendo</a>
  <div class="nav-left">
    @if (authService.isAdmin()) {
      <a routerLink="admin" title="{{ 'nav.admin' | translate }}">
        <span class="material-icons">admin_panel_settings</span>
      </a>
    }
    <a routerLink="/cart" class="cart-link" title="{{ 'nav.cart' | translate }}">
      <span class="material-icons">shopping_cart</span>
      @if (cartService.cartCount() > 0) {
        <span class="cart-badge">{{ cartService.cartCount() }}</span>
      }
    </a>
    @if (authService.isLoggedIn()) {
      <a routerLink="/profile" title="{{ 'nav.profile' | translate }}">
        <span class="material-icons">person</span>
      </a>
    } @else {
      <a routerLink="/login" title="{{ 'nav.login' | translate }}">
        <span class="material-icons">login</span>
      </a>
    }
    <div class="lang-switch">
      <button (click)="switchLang('nl')" [class.active]="currentLang === 'nl'">
        <img src="/assets/images/nl_flag.png" alt="Nederlands">
      </button>
      <button (click)="switchLang('en')" [class.active]="currentLang === 'en'">
        <img src="/assets/images/en_flag.png" alt="English">
      </button>
    </div>
    <button
      class="colorblind-toggle"
      (click)="colorblindService.toggle()"
      [class.active]="colorblindService.isColorblind()"
      title="{{ 'nav.colorblind' | translate }}">
  <span class="material-icons">
    {{ colorblindService.isColorblind() ? 'visibility' : 'visibility_off' }}
  </span>
    </button>
  </div>
</nav>
