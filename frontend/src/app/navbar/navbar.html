<nav>
  <a class="brand" routerLink="/">Binbendo</a>
  <div class="nav-left">
    @if (authService.isAdmin()) {
      <a routerLink="admin">Admin</a>
    }
    <a routerLink="/cart" class="cart-link">
      {{ 'nav.cart' | translate }}
      @if (cartService.cartCount() > 0) {
        <span class="cart-badge">{{ cartService.cartCount() }}</span>
      }
    </a>
    @if (authService.isLoggedIn()) {
      <a routerLink="/profile">{{ 'nav.profile' | translate }}</a>
    } @else {
      <a routerLink="/login">{{ 'nav.login' | translate }}</a>
    }
    <div class="lang-switch">
      <button (click)="switchLang('nl')" [class.active]="currentLang === 'nl'">
        <img src="/assets/images/nl_flag.png" alt="Nederlands">
      </button>
      <button (click)="switchLang('en')" [class.active]="currentLang === 'en'">
        <img src="/assets/images/en_flag.png" alt="English">
      </button>
    </div>
  </div>
</nav>
