@if (product()) {
  <section class="product-detail">
    <img [src]="product()!.imageUrl" [alt]="product()!.name">
    <div class="info">
      <h1>{{ product()!.name }}</h1>
      <p class="description">{{ product()!.description }}</p>
      <div class="price-row">
        <p class="price">{{ product()!.price | currency:'EUR'}}</p>
        <div class="actions">
          <div class="quantity">
            <button (click)="quantity() > 1 && quantity.set(quantity() - 1)">-</button>
            <span>{{ quantity() }}</span>
            <button (click)="quantity.set(quantity() + 1)">+</button>
          </div>
          <button class="add-to-cart-button" (click)="addToCart()">+ Winkelwagen</button>
        </div>
      </div>
    </div>
  </section>
}

@else {
  <h1>Product niet gevonden!</h1>
}
