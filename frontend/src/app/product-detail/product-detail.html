@if (product()) {
  <section class="product-detail">
    <img [src]="product()!.imageUrl" [alt]="product()!.name">
    <div class="info">
      <h1>{{ product()!.name }}</h1>
      <p class="description">{{ product()!.description }}</p>
      <p class="price">{{ product()!.price | currency:'EUR'}}</p>
    </div>
  </section>
} @else {
  <h1>Product not found!</h1>
}
