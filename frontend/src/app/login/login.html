<div class="login-page">
  <div class="login-container">
    <h2>{{ 'login.title' | translate }}</h2>
    <input type="email" [(ngModel)]="email" [placeholder]="'login.email' | translate">
    <input type="password" [(ngModel)]="password" [placeholder]="'login.password' | translate">
    <button (click)="login()" [disabled]="!email || !password">{{ 'login.button' | translate }}</button>
    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
    <p>
      {{ 'login.no_account' | translate }}
      <a routerLink="/register">{{ 'login.register_link' | translate }}</a>
    </p>
  </div>
</div>
