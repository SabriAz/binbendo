services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    networks:
      - web
    expose:
      - "80"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/binbendo
      SPRING_DATASOURCE_USERNAME: binbendo
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - web
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: binbendo
      POSTGRES_USER: binbendo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - web

volumes:
  pgdata:

networks:
  web:
    external: true